<!DOCTYPE html>
<html lang> 
<head>
    <meta charset="UTF-8">
    <title>Payroll Edge</title>
    <link rel="stylesheet" href="MAUHAO.css">
</head>
<body>

<header>
    <h1>PayRoll Edge</h1>
    <p>Track. Calculate. Get Paid.</p>
</header>

<div class="grid">

    <div class="card highlight">
        <h3>Next Payday</h3>
        <p id="payday">April 15, 2026</p>
    </div>

    <div class="card">
        <h3>Total Hours</h3>    
        <p id="hours">0 hrs</p>

    <div class="card">
        <h3>Tax</h3>
        <p id="tax">₱0</p>
    </div>

    <div class="card large">
        <h3>Log Work Hours</h3>
        <input type="number" id="inputHours" placeholder="Enter hours worked">
        <button onclick="addHours()">Add Hours</button>
    </div>

    <div class="card large">
        <h3>Payslip</h3>
        <div id="payslip">
            No data yet
        </div>
        <button onclick="exportData()">Export Data</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
