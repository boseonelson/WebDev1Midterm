<!DOCTYPE html>
<html>
<head>
      <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MAUHAO </title>
    <link rel="stylesheet" href="MAUHAOstyle.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="logo-icon">😼</div>
                <h1>MAUHAO <span>Music</span></h1>
                <p>Log in to your Account Hao!</p>
            </div>

            <form action="MAUHAO page.html" method="GET">
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
                  
                <div class="footer-links">
                    <a href="forgot.html">Forgot Password?</a>
                    <div class="divider"></div>
                    <span>New mao? <a href="Sign Up.html" class="signup">Sign up</a></span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
