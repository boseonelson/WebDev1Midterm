<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bill | MAUHAO</title>
        <link rel="stylesheet" href="Log MAUHAO.css">
    </head>

<body>

    <header>

        <a class="brand" href="Log MAUHAO.html">
        <img src="logo.png" class="logo">
        MAUHAO🐱
        </a>

    <nav>
        <a href="MAUHAO meals.html">Meals</a>  
        <a href="Log MAUHAO.html">Billing</a>
        <a href="MAUHAO plan.html">Plans</a>
        <a href="MAUHAO nutrients.html">Nutrients</a>
    </nav>

    <button onclick="openLogin()">Login</button>
    </header>


    <section class="gallery">
        <h2>Billing Information</h2>
            <div class="card">
                <form>
                    <label>Full Name</label><br>
                    <input type="text" placeholder="Enter your name" required><br><br>

                    <label>Email</label><br>
                    <input type="email" placeholder="Enter your email" required><br><br>

                    <label>Select Meal Plan</label><br>
                    <select required>
                        <option value="">Choose Plan</option>
                        <option>Weekly Meal Plan</option>
                        <option>Monthly Meal Plan</option>
                        <option>Custom Meal Plan</option>
                    </select><br><br>

                    <label>Payment Method</label><br>
                    <select required>
                        <option value="">Choose Payment</option>
                        <option>Cash on Delivery</option>
                        <option>GCash</option>
                        <option>Credit Card</option>
                    </select><br><br>   

                    <label>Address</label><br>
                    <textarea placeholder="Enter delivery address"></textarea><br><br>

                    <button type="submit">Confirm Payment</button>

                </form>

            </div>
    </section>


    <div id="loginDrawer" class="drawer">
        <span class="close" onclick="closeLogin()">✖</span>
            <h2>Login</h2>
            <form action="MAUHAO home.html" method="GET">
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
            
                <button class="loginBtn" onclick="login()">Login</button>
            </form>
    </div>


    <script>
        function openLogin()
        {
        document.getElementById("loginDrawer").style.right = "0";
        }

        function closeLogin()
        {
        document.getElementById("loginDrawer").style.right = "-350px";
        }

        function login()
        {
        alert("Successfully Logged In!");
        }

    </script>

</body>
</html>
